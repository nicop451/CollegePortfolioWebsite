server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip text + assets
    gzip on;
    gzip_vary on;
    gzip_types
        text/html text/css text/plain
        application/javascript application/json
        image/svg+xml;

    # All routes fall back to index.html (single-page scroll site)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed/immutable assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|mp4|webp|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

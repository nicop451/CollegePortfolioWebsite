<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#07090f" />
    <title>Nico — Dashboard</title>
    <meta name="description" content="Personal app dashboard for Nico." />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="dashboard">
        <header class="dashboard-header">
            <p class="kicker">Dashboard</p>
            <h1 class="dashboard-name">Nico</h1>
            <p class="dashboard-sub">Your app home base</p>
        </header>

        <section class="panel" aria-labelledby="cotd-heading">
            <div class="panel-head">
                <h2 id="cotd-heading">Company of the Day</h2>
                <span class="badge">Daily</span>
            </div>
            <div class="panel-body" id="company-of-the-day">
                <p class="placeholder">No company picked yet. This section will show today&apos;s featured company.</p>
            </div>
        </section>

        <section class="panel" aria-labelledby="opps-heading">
            <div class="panel-head">
                <h2 id="opps-heading">Agent Opportunities Scraped</h2>
                <span class="badge badge-muted">Scraper</span>
            </div>
            <div class="panel-body" id="agent-opportunities">
                <p class="placeholder">No opportunities loaded yet. Scraped agent roles will appear here.</p>
            </div>
        </section>

        <nav class="dashboard-links" aria-label="Apps">
            <a href="/books.html" class="text-link">
                <span>books</span>
                <span class="text-link-arrow" aria-hidden="true">--&gt;</span>
            </a>
        </nav>
    </main>

    <footer class="site-footer">
        <p>&copy; <span id="year"></span> Nico</p>
    </footer>

    <script src="script.js?v=4" defer></script>
</body>
</html>

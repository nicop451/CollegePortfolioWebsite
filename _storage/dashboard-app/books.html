<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#07090f" />
    <title>Books — Nico</title>
    <meta name="description" content="Book recommendations and reading list for Nico." />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="dashboard">
        <nav class="page-nav" aria-label="Back">
            <a href="/" class="text-link text-link-back">
                <span class="text-link-arrow" aria-hidden="true">&lt;--</span>
                <span>dashboard</span>
            </a>
        </nav>

        <header class="dashboard-header">
            <p class="kicker">App</p>
            <h1 class="dashboard-name">Books</h1>
            <p class="dashboard-sub">Tell me what you&apos;re in the mood for. I&apos;ll find books that fit.</p>
        </header>

        <section class="panel" aria-labelledby="search-heading">
            <div class="panel-head">
                <h2 id="search-heading">Find Recommendations</h2>
                <span class="badge">Search</span>
            </div>
            <div class="panel-body">
                <form id="book-search-form" class="book-search">
                    <label for="book-prompt" class="visually-hidden">Describe what you want to read</label>
                    <textarea
                        id="book-prompt"
                        name="prompt"
                        placeholder="e.g. quiet literary novels set in the Pacific Northwest, or hard sci-fi about first contact"
                        rows="3"
                        required
                    ></textarea>
                    <div class="book-search-actions">
                        <button type="submit" class="btn btn-primary" id="search-button">
                            <span>Recommend books</span>
                        </button>
                        <button type="button" class="btn btn-ghost" id="clear-button">Clear</button>
                    </div>
                </form>
                <div id="search-status" class="search-status" aria-live="polite"></div>
                <div id="results" class="book-grid" aria-live="polite"></div>
            </div>
        </section>

        <section class="panel" aria-labelledby="library-heading">
            <div class="panel-head">
                <h2 id="library-heading">My Library</h2>
                <span class="badge badge-muted" id="library-count">0</span>
            </div>
            <div class="panel-body">
                <div class="library-filters" role="tablist" aria-label="Filter library by status">
                    <button class="filter-chip is-active" data-filter="all" role="tab" aria-selected="true">All</button>
                    <button class="filter-chip" data-filter="want" role="tab" aria-selected="false">Want to Read</button>
                    <button class="filter-chip" data-filter="reading" role="tab" aria-selected="false">Reading</button>
                    <button class="filter-chip" data-filter="read" role="tab" aria-selected="false">Read</button>
                </div>
                <div id="library" class="book-grid">
                    <p class="placeholder" id="library-empty">No saved books yet. Save one from the recommendations above.</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; <span id="year"></span> Nico</p>
    </footer>

    <script src="script.js?v=4" defer></script>
    <script src="books.js?v=4" defer></script>
</body>
</html>

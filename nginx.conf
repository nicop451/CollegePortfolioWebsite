server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip text + assets
    gzip on;
    gzip_vary on;
    gzip_types
        text/html text/css text/plain
        application/javascript application/json
        image/svg+xml;

    # SPA / PWA shell
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker must not be cached long-term
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # Book search proxy (same-origin — avoids browser cache + third-party rate limits)
    location /api/books/search {
        proxy_pass https://openlibrary.org/search.json;
        proxy_ssl_server_name on;
        proxy_set_header Host openlibrary.org;
        proxy_set_header User-Agent "NicoDashboard/1.0 (+https://nicholaspietronuto.fly.dev)";
        proxy_set_header Accept-Encoding "";
        add_header Cache-Control "no-store";
    }

    # App scripts/styles — always revalidate (deploys must reach users quickly)
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Long-lived cache for static media only
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
